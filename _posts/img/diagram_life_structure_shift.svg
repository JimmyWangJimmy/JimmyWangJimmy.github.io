<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="920" rx="40" fill="#F7F3EC"/>
  <rect x="56" y="56" width="1488" height="808" rx="32" fill="#FFFCF8" stroke="#E6DDD1" stroke-width="2"/>
  <text x="108" y="140" fill="#102231" font-size="52" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">从小问题到生活结构暴露的过程</text>
  <text x="108" y="188" fill="#5B6A77" font-size="26" font-family="Avenir Next, PingFang SC, sans-serif">“半颗牙齿”不是核心，真正被照出来的是节奏、精力和长期拖延的结构。</text>

  <rect x="134" y="340" width="250" height="170" rx="28" fill="#FBEFEF" stroke="#E2B9B9" stroke-width="2"/>
  <text x="176" y="412" fill="#8B3F3F" font-size="36" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">身体提醒</text>
  <text x="176" y="460" fill="#5F6F7B" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">一个小问题开始出现</text>

  <rect x="484" y="340" width="250" height="170" rx="28" fill="#F7EBDD" stroke="#DEBB8D" stroke-width="2"/>
  <text x="526" y="412" fill="#9B5A18" font-size="36" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">停止拖延</text>
  <text x="526" y="460" fill="#5F6F7B" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">不能再用“以后再说”应付</text>

  <rect x="834" y="340" width="250" height="170" rx="28" fill="#EAF0FA" stroke="#AEC2E7" stroke-width="2"/>
  <text x="876" y="412" fill="#2F4E87" font-size="36" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">回看节奏</text>
  <text x="876" y="460" fill="#5F6F7B" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">作息、精力和情绪结构暴露出来</text>

  <rect x="1184" y="340" width="250" height="170" rx="28" fill="#E8F6F1" stroke="#9FD1C4" stroke-width="2"/>
  <text x="1226" y="412" fill="#0E6B63" font-size="36" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">重新整理</text>
  <text x="1226" y="460" fill="#5F6F7B" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">开始认真对待生活方式本身</text>

  <path d="M384 425H470" stroke="#BF8C8C" stroke-width="6" stroke-linecap="round"/>
  <path d="M734 425H820" stroke="#CDA673" stroke-width="6" stroke-linecap="round"/>
  <path d="M1084 425H1170" stroke="#88A9D9" stroke-width="6" stroke-linecap="round"/>
