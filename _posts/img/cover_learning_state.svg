<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F4F0E9"/>
  <rect x="72" y="72" width="1456" height="756" rx="34" fill="#FCFBF7" stroke="#DDD4C8" stroke-width="2"/>
  <rect x="118" y="120" width="500" height="660" rx="28" fill="#2B3D4B"/>
  <rect x="656" y="120" width="762" height="660" rx="28" fill="#EEE5D8"/>
  <rect x="716" y="190" width="642" height="128" rx="20" fill="#D8C5A3"/>
  <rect x="716" y="356" width="642" height="128" rx="20" fill="#C2D5CF"/>
  <rect x="716" y="522" width="642" height="188" rx="20" fill="#F7F2EA" stroke="#D7CFC4"/>
  <text x="164" y="214" fill="#D9E5EA" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" letter-spacing="4">READING / REFLECTION</text>
  <text x="164" y="318" fill="#FFFFFF" font-size="74" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">有些学习日记</text>
  <text x="164" y="398" fill="#FFFFFF" font-size="74" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">记录的不是知识点</text>
  <text x="164" y="478" fill="#C9D7DD" font-size="36" font-family="Avenir Next, PingFang SC, sans-serif">而是那个阶段为什么还在学</text>
  <text x="760" y="270" fill="#5E4A34" font-size="32" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">学习有时不是为了前进，而是为了不松掉</text>
  <text x="760" y="436" fill="#29534D" font-size="32" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">很多真正有价值的积累，最开始都不像成果</text>
  <text x="760" y="610" fill="#4E4338" font-size="46" font-family="Georgia, PingFang SC, serif" font-weight="700">我今天还在学</text>
  <text x="760" y="678" fill="#6E6257" font-size="28" font-family="Avenir Next, PingFang SC, sans-serif">这句话本身，就已经说明了那个阶段的气压</text>
</svg>
