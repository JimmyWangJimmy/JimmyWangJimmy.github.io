- key: 阅读与思考
  title: 阅读与思考
  kicker: Reading
  description: 书、影、音、复盘和一些慢一点的判断，用来保留技术之外的节奏与深度。
  path: /yue-du-yu-si-kao/
  highlights:
    - 读书与观影札记
    - 月度输入与状态切片
    - 方法论与长期判断
  featured_posts:
    - 最近的输入结构：金融、AI、传记为什么同时出现在我的书单里
    - 工作一年之后，我开始重新整理什么是值得长期投入的东西
    - 最近循环的 10 张专辑，像一份不太稳定但诚实的状态记录
  side_notes:
    - title: 最近的输入方向
      body: 金融、AI、传记、音乐，这几条线并不是分散兴趣，而是在共同校准判断、节奏和工作方式。
    - title: 这一栏适合怎么读
      body: 不必按时间顺序。更适合从一篇你有感受的题目进去，再回头看它和其他输入之间的关系。
    - title: 这一栏会继续长什么
      body: 读书、观影、歌单、阶段复盘，以及那些技术之外但会反过来影响技术判断的内容。
  project_links:
    - title: 豆瓣主页
      url: https://www.douban.com/people/189701523/
      note: 公开的书、影、音和阶段性输入来源。
