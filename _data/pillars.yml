- key: 拆问题
  title: 拆问题
  kicker: Debugging
  description: 从故障、代理、环境、配置到链路，把现实里不工作的东西拆开、定位、修好。
  path: /chai-wen-ti/
  highlights:
    - 真实排障实录
    - 根因定位与修复
    - 环境、代理、工具链问题
  featured_posts:
    - OpenClaw Discord 排障实录：Bot 在线但不回复的根因与修复
    - 彻底终结 MCP 连接地狱：Windows 环境下的路径排查与环境优化实战
    - 解决ERROR: Permission to .git denied to deploy key fatal: Could not read from remote repository.
  side_notes:
    - title: 这一栏写什么
      body: 从表面现象到根因定位，再到最小可用修复，重点是把故障真正拆开，而不是停在经验口令。
    - title: 适合怎么读
      body: 如果你正卡在某个问题上，先找相近症状；如果你在搭环境，这一栏也适合当避坑手册看。
    - title: 后面会继续补什么
      body: 环境、代理、权限、链路、部署和数据清洗类问题都会继续往这里收拢。
  project_links:
    - title: financial-penalty-api
      url: https://github.com/JimmyWangJimmy/financial-penalty-api
      note: 从数据采集、清洗到 API 服务的一整条工程链路。
    - title: JimmyWangJimmy.github.io
      url: https://github.com/JimmyWangJimmy/JimmyWangJimmy.github.io
      note: 博客本身也是一条持续演化的排障与重构记录。

- key: 与AI共生
  title: 与AI共生
  kicker: Human + AI
  description: 不把 AI 当口号，而是记录它如何真正进入我的开发、写作、知识管理和工作流。
