  <text x="156" y="470" fill="#4D626D" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">• 主动投资组合管理</text>
  <text x="156" y="504" fill="#4D626D" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">• 大衰退</text>

