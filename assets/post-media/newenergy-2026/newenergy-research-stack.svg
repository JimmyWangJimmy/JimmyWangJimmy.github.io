<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="920" fill="#F6F2EA"/>
  <rect x="70" y="70" width="1460" height="780" rx="36" fill="#FFFDF9" stroke="#E6DDD0" stroke-width="2"/>
  <text x="110" y="145" fill="#1F2937" font-size="54" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">New Energy Annual Report Research Stack</text>
  <text x="110" y="190" fill="#6B7280" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">从 CNINFO 年报 PDF 到产业链文本数据库，再到研究结论</text>

  <rect x="120" y="270" width="280" height="130" rx="24" fill="#FDE8D7" stroke="#E9B38B" stroke-width="2"/>
  <text x="155" y="325" fill="#9A3412" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">PDF 输入层</text>
  <text x="155" y="360" fill="#7C2D12" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">CNINFO 年报</text>
  <text x="155" y="388" fill="#7C2D12" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">60 家公司 / 2022-2025</text>

  <rect x="450" y="270" width="300" height="130" rx="24" fill="#E8F1FF" stroke="#91B1E8" stroke-width="2"/>
  <text x="485" y="325" fill="#1D4ED8" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">章节抽取层</text>
  <text x="485" y="360" fill="#1E3A8A" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">MD&amp;A / 风险因素 / 主营业务</text>
  <text x="485" y="388" fill="#1E3A8A" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">财务摘要</text>

  <rect x="800" y="270" width="300" height="130" rx="24" fill="#E9F7EE" stroke="#8AC39B" stroke-width="2"/>
  <text x="835" y="325" fill="#166534" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">结构化变量层</text>
  <text x="835" y="360" fill="#14532D" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">financial_metrics / text_features</text>
  <text x="835" y="388" fill="#14532D" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">master_table</text>

  <rect x="1150" y="270" width="300" height="130" rx="24" fill="#F2EAFE" stroke="#B79BE8" stroke-width="2"/>
  <text x="1185" y="325" fill="#6D28D9" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">研究输出层</text>
  <text x="1185" y="360" fill="#581C87" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">景气分化 / 风险叙事</text>
  <text x="1185" y="388" fill="#581C87" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">图表 / Brief / HTML</text>

  <rect x="355" y="520" width="900" height="190" rx="28" fill="#FFF7D8" stroke="#E7CB74" stroke-width="2"/>
  <text x="395" y="575" fill="#92400E" font-size="36" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">V2 数据库升级</text>
  <text x="395" y="620" fill="#78350F" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">paragraph_table_v2：段落级证据</text>
  <text x="395" y="652" fill="#78350F" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">event_candidate_table_v2：扩产 / 价格压力 / 出海 / 技术升级等事件候选</text>
  <text x="395" y="684" fill="#78350F" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">time_value_table_v2：时间线索与数值线索</text>
  <text x="395" y="716" fill="#78350F" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">company_year_summary_v2：公司-年份汇总，用于比较不同产业环节叙事差异</text>

  <path d="M400 335H450" stroke="#B48A57" stroke-width="4" stroke-linecap="round"/>
  <path d="M750 335H800" stroke="#7CA8D8" stroke-width="4" stroke-linecap="round"/>
  <path d="M1100 335H1150" stroke="#7EB58F" stroke-width="4" stroke-linecap="round"/>
  <path d="M950 400V485" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>

  <text x="112" y="790" fill="#6B7280" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">重点不是“抓到年报”本身，而是把制度化披露文本转成一个可比较、可复现、可继续扩展的研究底座。</text>
</svg>
