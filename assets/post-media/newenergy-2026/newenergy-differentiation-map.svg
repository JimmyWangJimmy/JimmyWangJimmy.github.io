<svg width="1500" height="900" viewBox="0 0 1500 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="900" fill="#F7F2E8"/>
  <text x="90" y="115" fill="#1F2937" font-size="52" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">Narrative Differentiation Across the Chain</text>
  <text x="90" y="158" fill="#6B7280" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">同样是新能源，年报里讲的不是同一件事</text>

  <rect x="120" y="240" width="280" height="180" rx="28" fill="#FDE8D7" stroke="#E8B089" stroke-width="2"/>
  <text x="155" y="295" fill="#9A3412" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">上游资源</text>
  <text x="155" y="335" fill="#7C2D12" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">价格压力上升</text>
  <text x="155" y="365" fill="#7C2D12" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">盈利收缩信号增强</text>
  <text x="155" y="395" fill="#7C2D12" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">扩产叙事未完全消失</text>

  <rect x="460" y="240" width="280" height="180" rx="28" fill="#FCEBD0" stroke="#E5C277" stroke-width="2"/>
  <text x="495" y="295" fill="#92400E" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">光伏链</text>
  <text x="495" y="335" fill="#78350F" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">2024 风险词频抬升</text>
  <text x="495" y="365" fill="#78350F" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">价格竞争更明显</text>
  <text x="495" y="395" fill="#78350F" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">景气回落更显著</text>

  <rect x="800" y="240" width="280" height="180" rx="28" fill="#E8F7EE" stroke="#89C29A" stroke-width="2"/>
  <text x="835" y="295" fill="#166534" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">风储链</text>
  <text x="835" y="335" fill="#14532D" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">出海叙事更强</text>
  <text x="835" y="365" fill="#14532D" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">强调结构性增长</text>
  <text x="835" y="395" fill="#14532D" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">相对更偏扩张语言</text>

  <rect x="1140" y="240" width="280" height="180" rx="28" fill="#EAF0FF" stroke="#97B3E9" stroke-width="2"/>
  <text x="1175" y="295" fill="#1D4ED8" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">终端 / 循环</text>
  <text x="1175" y="335" fill="#1E3A8A" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">生态协同</text>
  <text x="1175" y="365" fill="#1E3A8A" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">现金流质量</text>
  <text x="1175" y="395" fill="#1E3A8A" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">运营稳健性</text>

  <rect x="250" y="540" width="1000" height="180" rx="30" fill="#FFFDF9" stroke="#DED6C7" stroke-width="2"/>
  <text x="300" y="600" fill="#1F2937" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">核心判断</text>
  <text x="300" y="645" fill="#374151" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">新能源产业链不是同步起落的整体，而是不同环节在同一阶段讲着不同的经营故事。</text>
  <text x="300" y="683" fill="#374151" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">如果只看营收和利润，很容易把这种分化压平；而年报文本让这些差异以制度化语言暴露出来。</text>

  <text x="92" y="820" fill="#6B7280" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">这张图不是行业真相本身，而是文本数据库提供的一个更细的观察框架：不同环节在同一时间里优先强调什么。</text>
</svg>
