<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="860" fill="#F6F1E7"/>
  <text x="90" y="110" fill="#1F2937" font-size="50" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">Agent Memory Layers</text>
  <text x="90" y="152" fill="#6B7280" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">同一个 Agent，不同层次记不同东西</text>

  <rect x="110" y="220" width="1180" height="470" rx="40" fill="#FFFDF9" stroke="#E7DED0" stroke-width="2"/>

  <rect x="180" y="280" width="1040" height="70" rx="24" fill="#E8F0FF" stroke="#9AB6E8" stroke-width="2"/>
  <text x="230" y="325" fill="#1D4ED8" font-size="30" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">工作记忆</text>
  <text x="430" y="325" fill="#334155" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">当前任务、当前页面、最近几轮上下文</text>

  <rect x="220" y="365" width="960" height="70" rx="24" fill="#EEF6EA" stroke="#9ED0AA" stroke-width="2"/>
  <text x="270" y="410" fill="#166534" font-size="30" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">短期记忆</text>
  <text x="470" y="410" fill="#334155" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">这周处理过什么、哪些资料刚看过、哪些结论待验证</text>

  <rect x="260" y="450" width="880" height="70" rx="24" fill="#FFF3DA" stroke="#E7C978" stroke-width="2"/>
  <text x="310" y="495" fill="#92400E" font-size="30" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">偏好记忆</text>
  <text x="510" y="495" fill="#334155" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">不早起、周中上班、能我学就别塞给你、输出尽量中文可视化</text>

  <rect x="300" y="535" width="800" height="70" rx="24" fill="#FDEBEE" stroke="#E7A2B4" stroke-width="2"/>
  <text x="350" y="580" fill="#9F1239" font-size="30" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">长期记忆</text>
  <text x="550" y="580" fill="#334155" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">长期主题、项目主线、重复出现的问题与判断框架</text>

  <rect x="340" y="620" width="720" height="70" rx="24" fill="#EFEAFF" stroke="#B8A2EB" stroke-width="2"/>
  <text x="390" y="665" fill="#6D28D9" font-size="30" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">经历记忆</text>
  <text x="590" y="665" fill="#334155" font-size="22" font-family="Avenir Next, PingFang SC, sans-serif">哪些流程成功、哪些发布翻车、哪些坑要主动规避</text>

  <text x="92" y="780" fill="#6B7280" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">没有分层记忆，Agent 就只能“会回答”；有分层记忆，Agent 才能“知道该怎么长期配合你”。</text>
</svg>
