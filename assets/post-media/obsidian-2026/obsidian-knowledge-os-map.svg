<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F7F2E8"/>
  <rect x="80" y="80" width="1440" height="740" rx="36" fill="#FFFDF8" stroke="#E4DCCF" stroke-width="2"/>
  <text x="120" y="150" fill="#1F2937" font-size="52" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">Obsidian + LLM Knowledge OS</text>
  <text x="120" y="195" fill="#6B7280" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">从入口消息到知识沉淀，再到行动路由</text>

  <rect x="130" y="270" width="250" height="120" rx="24" fill="#FDE8D7" stroke="#EAB38B" stroke-width="2"/>
  <text x="160" y="325" fill="#9A3412" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">入口消息</text>
  <text x="160" y="360" fill="#7C2D12" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">飞书 / X / 网页 / PDF</text>

  <rect x="445" y="270" width="250" height="120" rx="24" fill="#E7F1FF" stroke="#8BB4E8" stroke-width="2"/>
  <text x="480" y="325" fill="#1D4ED8" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">raw/</text>
  <text x="480" y="360" fill="#1E3A8A" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">保留原文与证据</text>

  <rect x="760" y="270" width="250" height="120" rx="24" fill="#E8F7EE" stroke="#87C39A" stroke-width="2"/>
  <text x="795" y="325" fill="#166534" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">wiki/</text>
  <text x="795" y="360" fill="#14532D" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">概念页 / 来源页 / 导航图</text>

  <rect x="1075" y="270" width="250" height="120" rx="24" fill="#F4EAFE" stroke="#B999E8" stroke-width="2"/>
  <text x="1110" y="325" fill="#6D28D9" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">outputs/</text>
  <text x="1110" y="360" fill="#581C87" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">回答 / 图表 / 幻灯片</text>

  <rect x="340" y="520" width="330" height="160" rx="28" fill="#FFF7D6" stroke="#E8C76A" stroke-width="2"/>
  <text x="375" y="575" fill="#92400E" font-size="32" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">Agent Memory</text>
  <text x="375" y="615" fill="#78350F" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">偏好、日程约束、长期主题、</text>
  <text x="375" y="645" fill="#78350F" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">已处理素材、行动边界</text>

  <rect x="760" y="520" width="330" height="160" rx="28" fill="#FBE9EE" stroke="#E9A6B7" stroke-width="2"/>
  <text x="795" y="575" fill="#9F1239" font-size="32" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">Route Decision</text>
  <text x="795" y="615" fill="#881337" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">丢弃 / 沉淀 / 深挖 / 排期 /</text>
  <text x="795" y="645" fill="#881337" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">汇报，不默认进日程</text>

  <rect x="1180" y="520" width="220" height="160" rx="28" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="2"/>
  <text x="1215" y="575" fill="#3730A3" font-size="32" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">_system/</text>
  <text x="1215" y="615" fill="#312E81" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">索引</text>
  <text x="1215" y="645" fill="#312E81" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">健康检查</text>

  <path d="M380 330H445" stroke="#B08B5A" stroke-width="4" stroke-linecap="round"/>
  <path d="M695 330H760" stroke="#7AA7D9" stroke-width="4" stroke-linecap="round"/>
  <path d="M1010 330H1075" stroke="#7BB38B" stroke-width="4" stroke-linecap="round"/>
  <path d="M860 390V470" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>
  <path d="M520 470C520 445 555 445 555 470V520" stroke="#C9A227" stroke-width="4" stroke-linecap="round"/>
  <path d="M925 470C925 445 960 445 960 470V520" stroke="#D46A8C" stroke-width="4" stroke-linecap="round"/>
  <path d="M1170 600H1090" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>
  <text x="121" y="760" fill="#6B7280" font-size="20" font-family="Avenir Next, PingFang SC, sans-serif">核心原则：原始证据先保留，知识沉淀与行动路由分开，Agent 只把真正需要你投入时间的事情推进日程。</text>
</svg>
