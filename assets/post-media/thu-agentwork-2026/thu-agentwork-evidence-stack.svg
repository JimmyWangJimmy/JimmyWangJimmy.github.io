<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="780" fill="#F6F1E8"/>
  <rect x="70" y="70" width="1060" height="640" rx="28" fill="#FFFDFC" stroke="#D9CBB7" stroke-width="2"/>
  <text x="100" y="130" fill="#2E2A26" font-family="Georgia, serif" font-size="44" font-weight="700">THU-AgentWork: 从原始 PDF 到研究证据层</text>
  <text x="100" y="170" fill="#6F6257" font-family="Helvetica, Arial, sans-serif" font-size="22">不是先做模型，而是先把抓取、核查、去重、目录治理和下一阶段的解析契约做扎实。</text>

  <rect x="100" y="230" width="220" height="170" rx="22" fill="#F4E1BE"/>
  <text x="128" y="280" fill="#2E2A26" font-family="Georgia, serif" font-size="30" font-weight="700">1. 抓取源</text>
  <text x="128" y="325" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">CNINFO</text>
  <text x="128" y="355" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">2025 年报正文 PDF</text>
  <text x="128" y="385" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">沪深北三地</text>

  <rect x="360" y="230" width="220" height="170" rx="22" fill="#FBECD7"/>
  <text x="388" y="280" fill="#2E2A26" font-family="Georgia, serif" font-size="30" font-weight="700">2. 规范化</text>
  <text x="388" y="325" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">标题过滤</text>
  <text x="388" y="355" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">摘要剔除</text>
  <text x="388" y="385" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">同公司同年去重</text>

  <rect x="620" y="230" width="220" height="170" rx="22" fill="#F4E1BE"/>
  <text x="648" y="280" fill="#2E2A26" font-family="Georgia, serif" font-size="30" font-weight="700">3. 资产化</text>
  <text x="648" y="325" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">分片目录</text>
  <text x="648" y="355" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">manifest / failures</text>
  <text x="648" y="385" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">18G 原始语料</text>

  <rect x="880" y="230" width="220" height="170" rx="22" fill="#FBECD7"/>
  <text x="908" y="280" fill="#2E2A26" font-family="Georgia, serif" font-size="30" font-weight="700">4. 解析契约</text>
  <text x="908" y="325" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">字段字典</text>
  <text x="908" y="355" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">schema / SQL</text>
  <text x="908" y="385" fill="#4E443C" font-family="Helvetica, Arial, sans-serif" font-size="20">parser implementation</text>

  <path d="M320 315H360" stroke="#A4662D" stroke-width="5" stroke-linecap="round"/>
  <path d="M580 315H620" stroke="#A4662D" stroke-width="5" stroke-linecap="round"/>
  <path d="M840 315H880" stroke="#A4662D" stroke-width="5" stroke-linecap="round"/>

  <rect x="120" y="470" width="960" height="180" rx="26" fill="#2F3027"/>
  <text x="160" y="530" fill="#F6F1E8" font-family="Georgia, serif" font-size="34" font-weight="700">项目真正值钱的部分</text>
  <text x="160" y="575" fill="#E7D9C3" font-family="Helvetica, Arial, sans-serif" font-size="24">4230 个候选公告，不等于 1494 份可核验的 canonical 年报；</text>
  <text x="160" y="610" fill="#E7D9C3" font-family="Helvetica, Arial, sans-serif" font-size="24">1494 份可核验年报，也不等于可直接研究的数据；</text>
  <text x="160" y="645" fill="#E7D9C3" font-family="Helvetica, Arial, sans-serif" font-size="24">这套仓库做的，是把“抓到 PDF”升级成“后续任何分析都能回到证据源头”。</text>

  <circle cx="109" cy="315" r="8" fill="#A4662D"/>
  <circle cx="1120" cy="315" r="8" fill="#A4662D"/>
</svg>
