<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="panel" x1="220" y1="130" x2="1380" y2="770" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="shadow" x="180" y="100" width="1240" height="700" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1340" cy="130" r="220" fill="#10B981" fill-opacity="0.10"/>
  <circle cx="220" cy="760" r="260" fill="#38BDF8" fill-opacity="0.08"/>
  <circle cx="1180" cy="760" r="180" fill="#22C55E" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="220" y="130" width="1160" height="640" rx="32" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
  </g>

  <rect x="280" y="200" width="160" height="42" rx="21" fill="#14532D"/>
  <text x="360" y="227" text-anchor="middle" fill="#BBF7D0" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">OpenClaw 排障</text>

  <text x="280" y="335" fill="#F8FAFC" font-size="66" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">
    Discord Bot 在线但不回复
  </text>
  <text x="280" y="418" fill="#E2E8F0" font-size="40" font-weight="600" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">
    真正的问题不是“没收到消息”
  </text>
  <text x="280" y="478" fill="#94A3B8" font-size="34" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">
    而是 gateway、allowlist 和代理链路分层失效
  </text>

  <rect x="280" y="548" width="480" height="112" rx="24" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
  <circle cx="334" cy="604" r="18" fill="#22C55E"/>
  <text x="374" y="615" fill="#DCFCE7" font-size="28" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">Bot 已登录并在线</text>

  <rect x="790" y="548" width="530" height="112" rx="24" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
  <circle cx="844" cy="604" r="18" fill="#F59E0B"/>
  <text x="884" y="615" fill="#FEF3C7" font-size="28" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">最终回复阶段 fetch failed</text>

  <path d="M1260 238C1294 238 1322 266 1322 300V408C1322 442 1294 470 1260 470H1136L1064 528V470H1020C986 470 958 442 958 408V300C958 266 986 238 1020 238H1260Z" fill="#111827" stroke="#334155" stroke-width="2"/>
  <circle cx="1048" cy="320" r="22" fill="#22C55E"/>
  <circle cx="1120" cy="320" r="22" fill="#22C55E"/>
  <circle cx="1192" cy="320" r="22" fill="#22C55E"/>
  <text x="1040" y="390" fill="#E2E8F0" font-size="28" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">消息进来了</text>
  <text x="1040" y="430" fill="#94A3B8" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">但是回复没发出去</text>

  <rect x="280" y="706" width="1040" height="6" rx="3" fill="#1E293B"/>
  <rect x="280" y="706" width="660" height="6" rx="3" fill="url(#accent)"/>
</svg>
