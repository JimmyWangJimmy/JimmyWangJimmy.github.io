<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="960" rx="40" fill="#F7F3EC"/>
  <rect x="56" y="56" width="1488" height="848" rx="32" fill="#FFFCF8" stroke="#E6DDD1" stroke-width="2"/>
  <text x="108" y="140" fill="#102231" font-size="52" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">Windows MCP 连接故障链路</text>
  <text x="108" y="188" fill="#5B6A77" font-size="26" font-family="Avenir Next, PingFang SC, sans-serif">终端里能跑，不代表 IDE 插件也能跑。问题藏在 Windows 可执行包装、NVM 路径和 STDIO 杂音之间。</text>

  <rect x="122" y="330" width="280" height="170" rx="28" fill="#FBEFEF" stroke="#E2B9B9" stroke-width="2"/>
  <text x="166" y="400" fill="#8B3F3F" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">npx 看似可用</text>
  <text x="166" y="446" fill="#5F6F7B" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">但底层其实是 npx.cmd</text>

  <rect x="450" y="330" width="280" height="170" rx="28" fill="#F8EDDF" stroke="#E1BE91" stroke-width="2"/>
  <text x="494" y="400" fill="#9B5A18" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">NVM 路径漂移</text>
  <text x="494" y="446" fill="#5F6F7B" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">插件拿不到动态全局包路径</text>

  <rect x="778" y="330" width="280" height="170" rx="28" fill="#EAF0FA" stroke="#AEC2E7" stroke-width="2"/>
  <text x="822" y="400" fill="#2F4E87" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">STDIO 被污染</text>
  <text x="822" y="446" fill="#5F6F7B" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">提示信息和报错让握手失败</text>

  <rect x="1106" y="330" width="280" height="170" rx="28" fill="#E7F6F1" stroke="#9DD4C7" stroke-width="2"/>
  <text x="1148" y="400" fill="#0E6B63" font-size="34" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">绝对路径直调</text>
  <text x="1148" y="446" fill="#5F6F7B" font-size="24" font-family="Avenir Next, PingFang SC, sans-serif">用 node 直接执行 dist/index.js</text>

  <path d="M402 416H434" stroke="#C38C8C" stroke-width="6" stroke-linecap="round"/>
  <path d="M730 416H762" stroke="#D1A56E" stroke-width="6" stroke-linecap="round"/>
  <path d="M1058 416H1090" stroke="#8FAEE0" stroke-width="6" stroke-linecap="round"/>

  <rect x="400" y="644" width="800" height="124" rx="30" fill="#102231"/>
  <text x="462" y="710" fill="#FFFFFF" font-size="36" font-family="Avenir Next, PingFang SC, sans-serif" font-weight="700">修复原则：</text>
  <text x="680" y="710" fill="#D7E0E8" font-size="32" font-family="Avenir Next, PingFang SC, sans-serif">不要让系统猜路径，显式指定 node 和入口文件的绝对路径。</text>
</svg>
